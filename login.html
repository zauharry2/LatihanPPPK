<!DOCTYPE html>
<html>
<head>
<title>Login PPPK</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#2563eb;
font-family:Arial;
}

.box{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
width:300px;
}

input{
width:90%;
padding:10px;
margin:8px;
}

button{
padding:10px 30px;
background:#16a34a;
color:white;
border:0;
border-radius:8px;
}
/* ===== LOGIN MOBILE ===== */

@media screen and (max-width:600px){

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:0 20px;

background:#2563eb;

}


.box{

width:100% !important;

max-width:360px !important;

padding:35px 25px !important;

box-sizing:border-box;

border-radius:20px;

}


.box h2{

font-size:24px;

margin-bottom:25px;

}


input{

display:block;

width:100% !important;

height:45px;

font-size:16px;

padding:10px;

margin:12px 0;

box-sizing:border-box;

}


button{

width:100%;

height:45px;

font-size:16px;

font-weight:bold;

}


}
</style>

</head>

<body>


<div class="box">

<h2>🔐 Login PPPK</h2>

<input id="user" placeholder="Username">

<input id="pass" 
type="password"
placeholder="Password">

<br>

<button onclick="login()">Masuk</button>

<p id="msg"></p>

</div>



<script>


const users = [

{
username:"admin",
password:"pppk2026"
},

{
username:"aj",
password:"12345"
},

{
username:"teman1",
password:"latihan123"
},

{
username:"peserta",
password:"cat2026"
}

];



function login(){


let u=document.getElementById("user").value;

let p=document.getElementById("pass").value;



let cek = users.find(

data =>

data.username === u &&

data.password === p

);



if(cek){


sessionStorage.setItem(
"akses",
"ok"
);


sessionStorage.setItem(
"user",
u
);


window.location="index.html";


}


else{


document.getElementById("msg").innerHTML =
"❌ Username atau Password salah";


}


}


</script>

</body>
</html>
